<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#0B2B2F">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Ponto PRO</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Fira+Code:wght@500&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #00D68F;
            --primary-dark: #00B87A;
            --bg-dark: #0B2B2F;
            --card-bg: rgba(255, 255, 255, 0.1);
            --text-light: #E9FFF2;
            --safe-top: env(safe-area-inset-top);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent; /* Remove brilho ao tocar no iOS */
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-light);
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            line-height: 1.4;
            padding-top: var(--safe-top); /* Suporte para notch do iPhone */
        }

        /* Container estilo App */
        .app-shell {
            max-width: 500px;
            margin: 0 auto;
            padding: 16px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Header Estilo Dashboard */
        .app-header {
            text-align: center;
            padding: 24px 0;
        }

        .clock-container {
            background: rgba(0, 0, 0, 0.4);
            padding: 15px 30px;
            border-radius: 50px;
            display: inline-block;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.1);
            margin-bottom: 12px;
        }

        #liveClock {
            font-family: 'Fira Code', monospace;
            font-size: 2.5rem;
            color: var(--primary);
            font-weight: 800;
            text-shadow: 0 0 10px rgba(0, 214, 143, 0.4);
        }

        .date-badge {
            font-size: 0.85rem;
            opacity: 0.8;
            letter-spacing: 0.5px;
        }

        /* Cards Estilo Glassmorphism */
        .glass-card {
            background: var(--card-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 28px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            animation: fadeIn 0.5s ease-out;
        }

        h3 {
            font-size: 1.1rem;
            margin-bottom: 18px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* Inputs Otimizados para Dedos */
        .input-row {
            margin-bottom: 15px;
        }

        label {
            display: block;
            font-size: 0.75rem;
            font-weight: 800;
            margin-bottom: 6px;
            color: var(--primary);
            text-transform: uppercase;
        }

        input {
            width: 100%;
            height: 54px; /* Altura ideal para toque */
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            color: white;
            padding: 0 16px;
            font-size: 1rem;
            transition: 0.3s;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
            background: rgba(255, 255, 255, 0.15);
        }

        /* Grid de Horários */
        .time-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        /* Botões Estilo Mobile */
        .btn {
            height: 56px;
            border-radius: 18px;
            border: none;
            font-weight: 800;
            font-size: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            cursor: pointer;
            transition: 0.2s;
            width: 100%;
            margin-bottom: 12px;
        }

        .btn-main {
            background: var(--primary);
            color: #042020;
            box-shadow: 0 10px 20px rgba(0, 214, 143, 0.2);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .btn:active {
            transform: scale(0.96);
        }

        /* Resultado Animado */
        #resultadoArea {
            transition: all 0.4s ease;
        }

        .res-line {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            font-size: 0.9rem;
        }

        .res-total {
            background: rgba(0, 214, 143, 0.15);
            margin: 15px -20px -20px -20px;
            padding: 20px;
            border-radius: 0 0 28px 28px;
            text-align: center;
            border-top: 1px solid var(--primary);
        }

        .res-total span {
            display: block;
            font-size: 0.8rem;
            text-transform: uppercase;
            font-weight: 800;
        }

        .res-total strong {
            font-size: 1.8rem;
            color: var(--primary);
        }

        /* Toast de Notificação */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: white;
            color: black;
            padding: 12px 24px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 0.9rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            z-index: 9999;
            opacity: 0;
            transition: 0.3s;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Ocultar scrollbar */
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

<div class="app-shell">
    <header class="app-header">
        <div class="clock-container">
            <div id="liveClock">00:00:00</div>
            <div class="date-badge" id="currentDate">-- de -- de ----</div>
        </div>
    </header>

    <div class="glass-card">
        <h3>👤 Configurações</h3>
        <div class="input-row">
            <label>Nome do Colaborador</label>
            <input type="text" id="nome" placeholder="Seu nome">
        </div>
        <div class="time-grid">
            <div class="input-row">
                <label>Salário Base</label>
                <input type="number" id="salario" placeholder="R$ 0,00" inputmode="decimal">
            </div>
            <div class="input-row">
                <label>Início Contrato</label>
                <input type="date" id="admissao">
            </div>
        </div>
    </div>

    <div class="glass-card">
        <h3>⏱️ Jornada Diária</h3>
        <div class="time-grid">
            <div class="input-row">
                <label>Entrada</label>
                <input type="time" id="entrada" value="08:00">
            </div>
            <div class="input-row">
                <label>Saída Almoço</label>
                <input type="time" id="almocoSaida" value="12:00">
            </div>
            <div class="input-row">
                <label>Volta Almoço</label>
                <input type="time" id="almocoRetorno" value="13:00">
            </div>
            <div class="input-row">
                <label>Saída Final</label>
                <input type="time" id="saidaFinal" value="17:00">
            </div>
        </div>
        <button class="btn btn-main" onclick="calcular()">📊 CALCULAR FOLHA</button>
    </div>

    <div id="resultadoArea"></div>

    <div style="margin-top: auto;">
        <div class="time-grid">
            <button class="btn btn-secondary" onclick="salvarLocal()">💾 SALVAR</button>
            <button class="btn btn-secondary" onclick="exportarRelatorio()">📄 PDF</button>
        </div>
    </div>
</div>

<div id="toast" class="toast">Dados salvos!</div>

<script>
    // Relógio Nativo
    function updateClock() {
        const now = new Date();
        document.getElementById('liveClock').textContent = now.toLocaleTimeString('pt-BR');
        const options = { day: 'numeric', month: 'short', year: 'numeric' };
        document.getElementById('currentDate').textContent = now.toLocaleDateString('pt-BR', options).toUpperCase();
    }
    setInterval(updateClock, 1000);
    updateClock();

    function showToast(msg) {
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.style.opacity = '1';
        t.style.bottom = '50px';
        setTimeout(() => {
            t.style.opacity = '0';
            t.style.bottom = '30px';
        }, 2000);
    }

    function timeToMin(t) {
        const [h, m] = t.split(':').map(Number);
        return h * 60 + m;
    }

    function calcular() {
        const salario = parseFloat(document.getElementById('salario').value) || 0;
        if(salario <= 0) {
            showToast("Defina o salário primeiro!");
            return;
        }

        const t1 = timeToMin(document.getElementById('entrada').value);
        const t2 = timeToMin(document.getElementById('almocoSaida').value);
        const t3 = timeToMin(document.getElementById('almocoRetorno').value);
        const t4 = timeToMin(document.getElementById('saidaFinal').value);

        const minTrabalhados = (t2 - t1) + (t4 - t3);
        const horasDia = minTrabalhados / 60;
        const valorHora = salario / 220;
        
        // Simulação Mensal (22 dias úteis)
        const dias = 22;
        const extrasDia = Math.max(0, horasDia - 8);
        const valorExtras = (extrasDia * valorHora * 1.5) * dias;
        const periculosidade = salario * 0.3;
        const dsr = valorExtras / 6;
        const inss = (salario + valorExtras + periculosidade) * 0.09; // Simplificado
        const liquido = (salario + valorExtras + periculosidade + dsr) - inss;

        const area = document.getElementById('resultadoArea');
        area.innerHTML = `
            <div class="glass-card" style="border-left: 4px solid var(--primary)">
                <h3>🧾 Demonstrativo Mensal</h3>
                <div class="res-line"><span>Jornada Diária</span><strong>${horasDia.toFixed(2)}h</strong></div>
                <div class="res-line"><span>Salário Base</span><strong>R$ ${salario.toFixed(2)}</strong></div>
                <div class="res-line"><span>Horas Extras (50%)</span><strong>R$ ${valorExtras.toFixed(2)}</strong></div>
                <div class="res-line"><span>DSR s/ Extras</span><strong>R$ ${dsr.toFixed(2)}</strong></div>
                <div class="res-line"><span>Periculosidade (30%)</span><strong>R$ ${periculosidade.toFixed(2)}</strong></div>
                <div class="res-line"><span>Desconto INSS</span><strong style="color:#ffb4a2">- R$ ${inss.toFixed(2)}</strong></div>
                <div class="res-total">
                    <span>Líquido Estimado</span>
                    <strong>R$ ${liquido.toFixed(2)}</strong>
                </div>
            </div>
        `;
        area.scrollIntoView({ behavior: 'smooth' });
    }

    function salvarLocal() {
        const dados = {
            nome: document.getElementById('nome').value,
            salario: document.getElementById('salario').value,
            admissao: document.getElementById('admissao').value
        };
        localStorage.setItem('pontoPro_User', JSON.stringify(dados));
        showToast("Dados salvos no aparelho!");
    }

    window.onload = () => {
        const saved = JSON.parse(localStorage.getItem('pontoPro_User'));
        if(saved) {
            document.getElementById('nome').value = saved.nome || '';
            document.getElementById('salario').value = saved.salario || '';
            document.getElementById('admissao').value = saved.admissao || '';
        }
    }

    function exportarRelatorio() {
        showToast("Gerando PDF...");
        setTimeout(() => window.print(), 500);
    }
</script>

</body>
</html>
