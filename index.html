<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#0B2B2F">
    <title>Ponto PRO | Relatório Oficial</title>
    <style>
        /* Estilos Visuais do App */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', system-ui, sans-serif; }
        
        body {
            background: linear-gradient(145deg, #0B2B2F 0%, #1A4A4F 100%);
            color: white; min-height: 100vh; padding: 16px;
        }

        .container { max-width: 500px; margin: 0 auto; }

        .header-card {
            background: rgba(0, 0, 0, 0.4); border-radius: 30px; padding: 20px;
            text-align: center; margin-bottom: 20px; border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .clock { font-size: 2.5rem; font-weight: 800; color: #00E5A0; font-family: monospace; }

        .card {
            background: rgba(255, 255, 255, 0.08); backdrop-filter: blur(15px);
            border-radius: 24px; padding: 20px; margin-bottom: 16px;
            border: 1px solid rgba(255, 255, 255, 0.15);
        }

        h3 { font-size: 0.85rem; margin-bottom: 15px; color: #E9FFF2; border-left: 4px solid #00E5A0; padding-left: 12px; text-transform: uppercase; }

        .input-group { margin-bottom: 12px; display: flex; flex-direction: column; gap: 5px; }
        label { font-size: 0.65rem; font-weight: 700; color: #BCF5E0; text-transform: uppercase; }

        input, textarea {
            width: 100%; background: #F5FEFB; border: none; border-radius: 12px;
            padding: 12px; font-size: 1rem; font-weight: 600; color: #0A2F2F; outline: none;
        }

        .grid-horas { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

        button {
            height: 54px; background: #00D68F; color: #042020;
            border: none; border-radius: 16px; font-size: 1rem;
            font-weight: 800; width: 100%; cursor: pointer; transition: 0.2s;
        }

        .resumo-card {
            background: #071E1E; border-radius: 24px; padding: 20px;
            margin-top: 10px; border: 2px solid #00E5A0;
        }

        .item-ponto {
            background: rgba(255, 255, 255, 0.05); border-radius: 15px;
            padding: 15px; margin-bottom: 10px; border-left: 4px solid #00E5A0;
        }

        .tag-tipo { padding: 2px 8px; border-radius: 6px; font-size: 0.6rem; color: #000; font-weight: bold; }

        .btn-acao {
            background: rgba(255, 255, 255, 0.1); color: white;
            border: 1px solid rgba(255, 255, 255, 0.2); height: 45px;
            border-radius: 12px; font-size: 0.8rem; cursor: pointer; font-weight: bold; width: 100%;
        }

        /* --- CONFIGURAÇÃO CRÍTICA PARA PDF/IMPRESSÃO --- */
        @media print {
            @page { margin: 1cm; }
            body { background: white !important; color: black !important; }
            .header-card, .card, button, .btn-acao, footer { display: none !important; }
            .container { max-width: 100% !important; width: 100% !important; }
            .resumo-card { 
                background: white !important; border: 1px solid #00E5A0 !important; 
                color: black !important; width: 100% !important; padding: 0 !important;
            }
            .item-ponto { 
                background: white !important; border: 1px solid #eee !important; 
                color: black !important; page-break-inside: avoid; 
                margin-bottom: 10px !important;
            }
            .tag-tipo { border: 1px solid #000 !important; background: #eee !important; }
            #historico { color: black !important; }
            .detalhe-hora { color: #666 !important; }
        }

        footer { text-align: center; font-size: 0.65rem; opacity: 0.4; margin: 20px 0; }
    </style>
</head>
<body>

<div class="container">
    <header class="header-card">
        <div class="clock" id="liveClock">00:00:00</div>
        <div id="currentDateDisplay" style="font-size: 0.8rem; margin-top:5px;"></div>
    </header>

    <div class="card">
        <h3>👤 Identificação</h3>
        <div class="input-group">
            <label>Nome do Funcionário</label>
            <input type="text" id="nomeFuncionario" placeholder="Ex: João Silva">
        </div>
        <div class="input-group">
            <label>Salário Base (R$)</label>
            <input type="text" id="salario" placeholder="3.000,00" inputmode="decimal">
        </div>
    </div>

    <div class="card">
        <h3>📅 Lançamento</h3>
        <div class="input-group">
            <label>Data</label>
            <input type="date" id="dataRegistro">
        </div>
        <div class="grid-horas">
            <div class="input-group"><label>Entrada</label><input type="time" id="t1" value="08:00"></div>
            <div class="input-group"><label>S. Almoço</label><input type="time" id="t2" value="12:00"></div>
            <div class="input-group"><label>R. Almoço</label><input type="time" id="t3" value="13:00"></div>
            <div class="input-group"><label>Saída Final</label><input type="time" id="t4" value="17:00"></div>
        </div>
        <div class="input-group">
            <label>Justificativa</label>
            <textarea id="justificativa" placeholder="Ex: Feriado trabalhado..."></textarea>
        </div>
        <button onclick="adicionarPonto()">💾 ADICIONAR AO RESUMO</button>
    </div>

    <div class="resumo-card" id="areaResumo">
        <h3>📋 Relatório para PDF</h3>
        <div id="historico"></div>
        
        <div style="margin-top: 15px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <button class="btn-acao" onclick="imprimirPDF()">📄 GERAR PDF</button>
            <button class="btn-acao" style="color:#FFB4A2" onclick="limparHistorico()">🗑️ LIMPAR</button>
        </div>
    </div>

    <footer>Ponto PRO | v3.0</footer>
</div>

<script>
    // Relógio
    setInterval(() => {
        const agora = new Date();
        document.getElementById('liveClock').innerText = agora.toLocaleTimeString('pt-BR');
        document.getElementById('currentDateDisplay').innerText = agora.toLocaleDateString('pt-BR', { dateStyle: 'full' });
    }, 1000);

    document.getElementById('dataRegistro').value = new Date().toISOString().split('T')[0];

    const feriados2026 = {
        "2026-05-01": "Dia do Trabalho", "2026-05-10": "Dia das Mães (100%)",
        "2026-09-07": "Independência", "2026-12-25": "Natal"
    };

    let registros = JSON.parse(localStorage.getItem('ponto_registros')) || [];

    function adicionarPonto() {
        const salBaseStr = document.getElementById('salario').value;
        const data = document.getElementById('dataRegistro').value;
        
        if (!salBaseStr || !data) return alert("Informe salário e data!");

        const salLimpo = parseFloat(salBaseStr.replace(/\./g, '').replace(',', '.'));
        const valorHoraNormal = salLimpo / 220;
        
        const hParaM = (h) => h.split(':').reduce((p, c) => p * 60 + +c);
        const minTrabalhados = (hParaM(document.getElementById('t4').value) - hParaM(document.getElementById('t3').value)) +
                               (hParaM(document.getElementById('t2').value) - hParaM(document.getElementById('t1').value));
        const horasTotais = minTrabalhados / 60;

        const dataObj = new Date(data + "T00:00:00");
        const diaSemana = dataObj.getDay();
        const feriado = feriados2026[data];

        let perc = 0, tipoLabel = "Normal", vHoraCalc = valorHoraNormal;

        if (feriado || diaSemana === 0) {
            perc = 100; tipoLabel = feriado || "Domingo (100%)"; vHoraCalc = valorHoraNormal * 2;
        } else if (diaSemana === 6) {
            perc = 50; tipoLabel = "Sábado (50%)"; vHoraCalc = valorHoraNormal * 1.5;
        } else if (horasTotais > 8) {
            perc = 50; tipoLabel = "Extra 50%";
        }

        let ganhoDia = 0;
        if (perc === 100 || (perc === 50 && diaSemana === 6)) {
            ganhoDia = horasTotais * vHoraCalc;
        } else {
            ganhoDia = (Math.min(horasTotais, 8) * valorHoraNormal) + (Math.max(0, horasTotais - 8) * valorHoraNormal * 1.5);
        }
        
        ganhoDia += (salLimpo * 0.3) / 22; // Periculosidade

        const format = (v) => v.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });

        registros.unshift({
            data, tipo: tipoLabel, horas: horasTotais.toFixed(2),
            vBase: format(valorHoraNormal), vFinal: format(vHoraCalc),
            total: format(ganhoDia), obs: document.getElementById('justificativa').value,
            cor: (perc === 100 ? '#FF4B2B' : (perc === 50 ? '#FFA500' : '#00E5A0'))
        });

        localStorage.setItem('ponto_registros', JSON.stringify(registros));
        localStorage.setItem('ponto_perfil', JSON.stringify({ nome: document.getElementById('nomeFuncionario').value, salario: salBaseStr }));
        renderizar();
    }

    function renderizar() {
        const div = document.getElementById('historico');
        div.innerHTML = registros.map(item => `
            <div class="item-ponto">
                <div style="display:flex; justify-content:space-between; margin-bottom:5px;">
                    <strong style="color:inherit">📅 ${item.data.split('-').reverse().join('/')}</strong>
                    <span class="tag-tipo" style="background:${item.cor}">${item.tipo}</span>
                </div>
                <div style="display:flex; justify-content:space-between; font-size:0.8rem;">
                    <span>Horas: ${item.horas}h <br> <small>Base: ${item.vBase} | Final: ${item.vFinal}</small></span>
                    <strong style="font-size:1.1rem; color:#00E5A0">${item.total}</strong>
                </div>
                ${item.obs ? `<div style="font-size:0.7rem; color:#FFA500; margin-top:5px; border-top:1px solid rgba(255,255,255,0.1); padding-top:5px;">💬 ${item.obs}</div>` : ''}
            </div>
        `).join('');
    }

    function imprimirPDF() {
        if (registros.length === 0) return alert("Adicione ao menos um dia!");
        window.print();
    }

    function limparHistorico() {
        if(confirm("Limpar tudo?")) {
            registros = []; localStorage.removeItem('ponto_registros'); renderizar();
        }
    }

    window.onload = () => {
        const p = JSON.parse(localStorage.getItem('ponto_perfil'));
        if (p) { document.getElementById('nomeFuncionario').value = p.nome; document.getElementById('salario').value = p.salario; }
        renderizar();
    };
</script>
</body>
</html>
